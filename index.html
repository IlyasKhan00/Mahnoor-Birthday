<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday Mahnoor 💖</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="glow g1"></div>
  <div class="glow g2"></div>

  <div class="scene">

    <!-- 🌸 flower -->
    <div class="flower" onclick="interactFlower()">
      <div class="stem"></div>

      <div class="leaf l1"></div>
      <div class="leaf l2"></div>

      <div class="bloom">
        <div class="petal p1"></div>
        <div class="petal p2"></div>
        <div class="petal p3"></div>
        <div class="petal p4"></div>
        <div class="petal p5"></div>
        <div class="petal p6"></div>
        <div class="petal p7"></div>
        <div class="petal p8"></div>
      </div>
    </div>

    <!-- 💌 card -->
    <div class="card">
      <h1>Happy Birthday Mahnoor 🎂</h1>

      <button onclick="interact()">wish me ✨</button>
      <button onclick="toggleMusic()" class="music-btn">🎵 music</button>
      <p id="typewriter"></p>

  <p id="message"></p>
      <p id="message"></p>
    </div>

  </div>
  <!-- 🎉 INTRO SCREEN -->
<div id="introScreen">
  <div class="introBox">
    <h1>🎂 Surprise for Mahnoor 💖</h1>
    <p>Click to enter your birthday world ✨</p>
    <button onclick="startExperience()">Start 🎉</button>
  </div>
</div>
<audio id="introSound">
  <source src="intro.mp3" type="audio/mpeg">
</audio>
  <!-- 🎵 music -->
  <audio id="bgMusic" preload="auto">
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <script src="script.js"></script>
</body>
</html>
<!-- 🎬 LOADING SCREEN -->
<div id="loadingScreen">
  <div class="loaderText">Preparing something special for Mahnoor 💖...</div>
</div>

<!-- 🎉 INTRO SCREEN -->
<div id="introScreen" style="display:none;">
  <div class="introBox">
    <h1>🎂 Surprise for Mahnoor 💖</h1>
    <p>Click to enter your birthday world ✨</p>
    <button onclick="startExperience()">Start 🎉</button>
  </div>
</div>
