<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday Mahnoor 💖</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<div class="banner">🎉 Happy Birthday Mahnoor 🎂</div>

<div class="scene">

  <!-- confetti container -->
  <div id="confetti"></div>

  <!-- glow background -->
  <div class="glow g1"></div>
  <div class="glow g2"></div>

  <!-- flower -->
  <div class="flower">

 <div class="flower">

  <div class="stem"></div>

  <div class="leaf l1"></div>
  <div class="leaf l2"></div>

  <div class="bloom">
    <div class="petal p1"></div>
    <div class="petal p2"></div>
    <div class="petal p3"></div>
    <div class="petal p4"></div>
    <div class="petal p5"></div>
    <div class="petal p6"></div>
    <div class="petal p7"></div>
    <div class="petal p8"></div>
  </div>

</div>

</div>

  <!-- card -->
  <div class="card">
    <h1>Happy Birthday Mahnoor 🎂</h1>
    <p class="sub">a soft little world for you 💖</p>

    <button onclick="interact()">wish me ✨</button>
    <p id="message"></p>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
